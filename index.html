<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RR2 – Conquest Calculator</title>

<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
<link rel="stylesheet" href="https://unpkg.com/spectre-icons.min.css">

<style>
body {
    background: #f4f6fb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #2c3e50;
}

.container {
    max-width: 1000px;
    margin-top: 30px;
    margin-bottom: 40px;
}

.table {
    background: #ffffff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.table td {
    vertical-align: middle;
}

.table img {
    height: 22px;
}

b {
    font-weight: 600;
}

.range-container {
    display: flex;
    align-items: center;
    gap: 15px;
}

.range-value {
    min-width: 70px;
    text-align: center;
    font-weight: 600;
    background: #e9efff;
    padding: 4px 8px;
    border-radius: 6px;
    color: #2c3e50;
    border: none;
    outline: none;
}

input[type="range"] {
    flex: 1;
    accent-color: #4c6ef5;
}

.form-input,
.form-select {
    border-radius: 6px;
    border: 1px solid #dcdfe6;
    background: #fafbff;
    transition: 0.2s ease;
}

.form-input:focus,
.form-select:focus {
    border-color: #4c6ef5;
    box-shadow: 0 0 0 2px rgba(76,110,245,0.15);
}

.accordion-header {
    background: #4c6ef5 !important;
    color: white !important;
    border-radius: 8px;
    margin-top: 15px;
    cursor: pointer;
    transition: 0.2s ease;
}

.accordion-header:hover {
    background: #3b5bdb !important;
}

.accordion-body {
    background: #ffffff;
    padding: 15px;
    border-radius: 0 0 10px 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.04);
}
</style>
</head>

<body>
<div class="container grid-xs">

<table class="table">
<tbody>
<tr>
<td></td>
<td class="text-center"><b>You</b></td>
<td class="text-center"><b>Opponent</b></td>
</tr>

<tr>
<td><img src="img/skull.png"></td>
<td class="text-center"><b id="skull_team">0</b></td>
<td class="text-center"><b id="skull_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/energy.png"></td>
<td class="text-center"><b id="power_team">0</b></td>
<td class="text-center"><b id="power_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/calculator.png"></td>
<td class="text-center"><b id="attackdef_team">0</b></td>
<td class="text-center"><b id="attackdef_opponent">0</b></td>
</tr>
</tbody>
</table>

<div class="accordion">
<input type="radio" id="accordion-1" name="accordion-checkbox" hidden checked>
<label class="accordion-header py-2" for="accordion-1">
<b>Settings</b>
</label>
<div class="accordion-body">

<table class="table">
<tbody>

<tr>
<td>Time Remaining</td>
<td colspan="2">
<div class="range-container">
    <input type="range" min="1" max="960" value="960" step="1" id="time_slider">
    <input type="text" id="time_display" class="range-value" value="16:00">
</div>
</td>
</tr>

</tbody>
</table>

</div>
</div>

</div>

<script src="js/regression.js"></script>
<script src="js/conquestCalculator.js"></script>

<script>
const slider = document.getElementById('time_slider');
const display = document.getElementById('time_display');

const MIN = parseInt(slider.min);
const MAX = parseInt(slider.max);

function formatTime(totalMinutes) {
    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    return h + ':' + (m < 10 ? '0' : '') + m;
}

function clamp(val) {
    return Math.min(Math.max(val, MIN), MAX);
}

function updateCalculator(totalMinutes) {
    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    calc.time_hour = h;
    calc.time_minute = m;
    calc.render();
}

function updateFromSlider() {
    const total = clamp(parseInt(slider.value));
    slider.value = total;
    display.value = formatTime(total);
    updateCalculator(total);
}

function updateFromInput() {
    const raw = display.value.replace(/[^\d:]/g, '');
    const parts = raw.split(':');

    if (parts.length !== 2) return;

    let h = parseInt(parts[0]) || 0;
    let m = parseInt(parts[1]) || 0;

    if (m > 59) m = 59;

    let total = clamp(h * 60 + m);

    slider.value = total;
    display.value = formatTime(total);
    updateCalculator(total);
}

display.addEventListener('input', () => {
    display.value = display.value.replace(/[^\d:]/g, '');
});

display.addEventListener('blur', updateFromInput);
display.addEventListener('change', updateFromInput);

display.addEventListener('keydown', (e) => {
    let current = parseInt(slider.value);

    if (e.key === 'ArrowUp') {
        e.preventDefault();
        current += e.shiftKey ? 5 : 1;
    }

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        current -= e.shiftKey ? 5 : 1;
    }

    current = clamp(current);
    slider.value = current;
    display.value = formatTime(current);
    updateCalculator(current);
});

slider.addEventListener('input', updateFromSlider);

updateFromSlider();
</script>

</body>
</html>
