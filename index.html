<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supreme Victory Calculator</title>

<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">

<style>
body {
    background: #f4f6fb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #2c3e50;
}

.container {
    max-width: 1000px;
    margin-top: 30px;
    margin-bottom: 40px;
}

.table {
    background: #ffffff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.table td {
    vertical-align: middle;
}

.table img {
    height: 22px;
}

b {
    font-weight: 600;
}

.range-container {
    display: flex;
    align-items: center;
    gap: 15px;
}

.range-value {
    min-width: 60px;
    text-align: center;
    font-weight: 600;
    background: #e9efff;
    padding: 4px 8px;
    border-radius: 6px;
    color: #2c3e50;
}

input[type="range"] {
    flex: 1;
    accent-color: #4c6ef5;
}

.form-input,
.form-select {
    border-radius: 6px;
    border: 1px solid #dcdfe6;
    background: #fafbff;
    transition: 0.2s ease;
}

.form-input:focus,
.form-select:focus {
    border-color: #4c6ef5;
    box-shadow: 0 0 0 2px rgba(76,110,245,0.15);
}

.accordion-header {
    background: #4c6ef5 !important;
    color: white !important;
    border-radius: 8px;
    margin-top: 15px;
    cursor: pointer;
    transition: 0.2s ease;
}

.accordion-header:hover {
    background: #3b5bdb !important;
}

.accordion-body {
    background: #ffffff;
    padding: 15px;
    border-radius: 0 0 10px 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.04);
}

.text-center b {
    font-size: 1.1rem;
}

.table:first-of-type td {
    font-size: 1.05rem;
}

.icon {
    vertical-align: middle;
}
</style>
</head>

<body>
<div class="container grid-xs">


<table class="table">
<tbody>
<tr>
<td></td>
<td class="text-center"><b>You</b></td>
<td class="text-center"><b>Opponent</b></td>
</tr>

<tr>
<td><img src="img/skull.png"></td>
<td class="text-center"><b id="skull_team">0</b></td>
<td class="text-center"><b id="skull_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/energy.png"></td>
<td class="text-center"><b id="power_team">0</b></td>
<td class="text-center"><b id="power_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/calculator.png"></td>
<td class="text-center"><b id="attackdef_team">0</b></td>
<td class="text-center"><b id="attackdef_opponent">0</b></td>
</tr>
</tbody>
</table>

<div class="accordion">
<input type="radio" id="accordion-1" name="accordion-checkbox" hidden checked>
<label class="accordion-header bg-primary py-2" for="accordion-1">
<i class="icon icon-arrow-right mr-1"></i>
<b>Settings</b>
</label>
<div class="accordion-body">

<table class="table">
<tbody>

<tr>
<td>Time Remaining</td>
<td colspan="2">
<div class="range-container">
    <input type="range" min="1" max="960" value="960" step="1" id="time_slider">
    <input 
    type="text" 
    class="range-value" 
    id="time_display" 
    value="16:00"
    style="border:none; outline:none; width:70px; text-align:center;"
>
</div>
</td>
</tr>

<tr>
<td>Attacker</td>
<td colspan="2">
<select class="form-select" id="attacker">
<option value="team">You</option>
<option value="opponent">Opponent</option>
</select>
</td>
</tr>

<tr>
<td>Skulls Won</td>
<td><input class="form-input" type="number" min="0" id="skull_win_team"></td>
<td><input class="form-input" type="number" min="0" id="skull_win_opponent"></td>
</tr>

<tr>
<td>Number of Heroes</td>
<td><input class="form-input" type="number" min="0" max="65" id="nb_player_team"></td>
<td><input class="form-input" type="number" min="0" max="65" id="nb_player_opponent"></td>
</tr>

<tr>
<td>Number of Troops</td>
<td><input class="form-input" type="number" min="0" id="nb_troop_team"></td>
<td><input class="form-input" type="number" min="0" id="nb_troop_opponent"></td>
</tr>

<tr>
<td>Terrain</td>
<td colspan="2">
<select class="form-select" id="ground">
<option value="0.7;1.3">Forest (0.8 / 1.2)</option>
<option value="1;0.8">Meadow (1 / 0.8)</option>
<option value="1;1">Swamp (1 / 1)</option>
<option value="0.8;0.5">Desert (0.8 / 0.5)</option>
<option value="0.9;1.1">Hills (0.9 / 1.1)</option>
<option value="0.7;1.5">Rocky Hills (0.7 / 1.5)</option>
<option value="0.9;0.7">Sandy Hills (0.9 / 0.7)</option>
</select>
</td>
</tr>

<tr>
<td>Tower Level</td>
<td colspan="2">
<select class="form-select" id="tower_level">
<option value="1">0</option>
<option value="1.2">1</option>
<option value="1.5">2</option>
<option value="2">3</option>
<option value="2.5">4</option>
</select>
</td>
</tr>

</tbody>
</table>

</div>
</div>

<div class="accordion">
<input type="radio" id="accordion-2" name="accordion-checkbox" hidden>
<label class="accordion-header bg-primary py-2" for="accordion-2">
<i class="icon icon-arrow-right mr-1"></i>
<b>Technologies</b>
</label>

<div class="accordion-body">

<table class="table">
<tbody>

<tr>
<td>Troop Attack Value +1</td>
<td>
<select class="form-select" id="attack_team_troop">
<option value="1">0</option>
<option value="2">1</option>
<option value="3">2</option>
<option value="4">3</option>
</select>
</td>
<td>
<select class="form-select" id="attack_opponent_troop">
<option value="1">0</option>
<option value="2">1</option>
<option value="3">2</option>
<option value="4">3</option>
</select>
</td>
</tr>

<tr>
<td>Troop Defense Value +1</td>
<td>
<select class="form-select" id="def_team_troop">
<option value="1">0</option>
<option value="2">1</option>
<option value="3">2</option>
<option value="4">3</option>
</select>
</td>
<td>
<select class="form-select" id="def_opponent_troop">
<option value="1">0</option>
<option value="2">1</option>
<option value="3">2</option>
<option value="4">3</option>
</select>
</td>
</tr>

<tr>
<td>Hero Attack Value +5</td>
<td>
<select class="form-select" id="attack_team_hero">
<option value="0">0</option>
<option value="5">1</option>
<option value="10">2</option>
<option value="15">3</option>
</select>
</td>
<td>
<select class="form-select" id="attack_opponent_hero">
<option value="0">0</option>
<option value="5">1</option>
<option value="10">2</option>
<option value="15">3</option>
</select>
</td>
</tr>

<tr>
<td>Hero Defense Value +5</td>
<td>
<select class="form-select" id="def_team_hero">
<option value="0">0</option>
<option value="5">1</option>
<option value="10">2</option>
<option value="15">3</option>
</select>
</td>
<td>
<select class="form-select" id="def_opponent_hero">
<option value="0">0</option>
<option value="5">1</option>
<option value="10">2</option>
<option value="15">3</option>
</select>
</td>
</tr>

<tr>
<td>Watchtower Defense Modifier +%</td>
<td>
<select class="form-select" id="team_tower">
<option value="0">0</option>
<option value="0.1">10</option>
<option value="0.2">20</option>
<option value="0.3">30</option>
<option value="0.4">40</option>
<option value="0.5">50</option>
<option value="0.6">60</option>
</select>
</td>
<td>
<select class="form-select" id="opponent_tower">
<option value="0">0</option>
<option value="0.1">10</option>
<option value="0.2">20</option>
<option value="0.3">30</option>
<option value="0.4">40</option>
<option value="0.5">50</option>
<option value="0.6">60</option>
</select>
</td>
</tr>

<tr>
<td>War Energy Cost -%</td>
<td>
<select class="form-select" id="team_power">
<option value="1">0</option>
<option value="0.9">10</option>
<option value="0.8">20</option>
<option value="0.7">30</option>
<option value="0.6">40</option>
<option value="0.5">50</option>
<option value="0.4">60</option>
</select>
</td>
<td>
<select class="form-select" id="opponent_power">
<option value="1">0</option>
<option value="0.9">10</option>
<option value="0.8">20</option>
<option value="0.7">30</option>
<option value="0.6">40</option>
<option value="0.5">50</option>
<option value="0.4">60</option>
</select>
</td>
</tr>

</tbody>
</table>

</div>
</div>


</div>

<script src="js/regression.js"></script>
<script src="js/conquestCalculator.js"></script>
<script>

const slider = document.getElementById('time_slider');
const display = document.getElementById('time_display');

function formatTime(totalMinutes) {
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    return hours + ':' + (minutes < 10 ? '0' : '') + minutes;
}

function updateFromSlider() {
    const totalMinutes = parseInt(slider.value);
    display.value = formatTime(totalMinutes);

    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;

    calc.time_hour = hours;
    calc.time_minute = minutes;
    calc.render();
}

function updateFromInput() {
    const value = display.value.trim();
    const parts = value.split(':');

    if (parts.length !== 2) return;

    let hours = parseInt(parts[0]);
    let minutes = parseInt(parts[1]);

    if (isNaN(hours) || isNaN(minutes)) return;

    let totalMinutes = hours * 60 + minutes;

    
    if (totalMinutes < parseInt(slider.min)) {
        totalMinutes = parseInt(slider.min);
    }
    if (totalMinutes > parseInt(slider.max)) {
        totalMinutes = parseInt(slider.max);
    }

    slider.value = totalMinutes;
    display.value = formatTime(totalMinutes);

    calc.time_hour = Math.floor(totalMinutes / 60);
    calc.time_minute = totalMinutes % 60;
    calc.render();
}


slider.addEventListener('input', updateFromSlider);


display.addEventListener('change', updateFromInput);
display.addEventListener('blur', updateFromInput);


updateFromSlider();
</script>

</body>
</html>
