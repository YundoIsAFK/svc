<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RR2 – Conquest Calculator</title>

<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
</head>

<body>
<div class="container grid-xs">

<h1 class="text-center mb-0">Conquest Calculator</h1>

<table class="table">
<tbody>
<tr>
<td></td>
<td class="text-center"><b>You</b></td>
<td class="text-center"><b>Opponent</b></td>
</tr>

<tr>
<td><img src="img/skull.png"></td>
<td class="text-center"><b id="skull_team">0</b></td>
<td class="text-center"><b id="skull_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/energy.png"></td>
<td class="text-center"><b id="power_team">0</b></td>
<td class="text-center"><b id="power_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/calculator.png"></td>
<td class="text-center"><b id="attackdef_team">0</b></td>
<td class="text-center"><b id="attackdef_opponent">0</b></td>
</tr>
</tbody>
</table>

<div class="accordion">
<input type="radio" id="accordion-1" name="accordion-checkbox" hidden checked>
<label class="accordion-header bg-primary py-2" for="accordion-1">
<i class="icon icon-arrow-right mr-1"></i>
<b>Settings</b>
</label>
<div class="accordion-body">

<table class="table">
<tbody>

<tr>
<td>Time Remaining</td>
<td><input class="form-input" type="number" min="0" max="23" id="time_hour" placeholder="Hours"></td>
<td><input class="form-input" type="number" min="0" max="59" id="time_minute" placeholder="Minutes"></td>
</tr>

<tr>
<td>Attacker</td>
<td colspan="2">
<select class="form-select" id="attacker">
<option value="team">You</option>
<option value="opponent">Opponent</option>
</select>
</td>
</tr>

<tr>
<td>Skulls Won</td>
<td><input class="form-input" type="number" min="0" id="skull_win_team"></td>
<td><input class="form-input" type="number" min="0" id="skull_win_opponent"></td>
</tr>

<tr>
<td>Number of Heroes</td>
<td><input class="form-input" type="number" min="0" max="65" id="nb_player_team"></td>
<td><input class="form-input" type="number" min="0" max="65" id="nb_player_opponent"></td>
</tr>

<tr>
<td>Number of Troops</td>
<td><input class="form-input" type="number" min="0" id="nb_troop_team"></td>
<td><input class="form-input" type="number" min="0" id="nb_troop_opponent"></td>
</tr>

<tr>
<td>Terrain</td>
<td colspan="2">
<select class="form-select" id="ground">
<option value="0.7;1.3">Forest (0.7 / 1.3)</option>
<option value="1;0.8">Meadow (1 / 0.8)</option>
<option value="1;1">Swamp (1 / 1)</option>
<option value="0.8;0.5">Desert (0.8 / 0.5)</option>
<option value="0.9;1.1">Hills (0.9 / 1.1)</option>
<option value="0.7;1.5">Rocky Hills (0.7 / 1.5)</option>
<option value="0.9;0.7">Sandy Hills (0.9 / 0.7)</option>
</select>
</td>
</tr>

<tr>
<td>Tower Level</td>
<td colspan="2">
<select class="form-select" id="tower_level">
<option value="1">0</option>
<option value="1.2">1</option>
<option value="1.5">2</option>
<option value="2">3</option>
<option value="2.5">4</option>
</select>
</td>
</tr>

</tbody>
</table>

</div>
</div>

<div class="accordion">
<input type="radio" id="accordion-2" name="accordion-checkbox" hidden>
<label class="accordion-header bg-primary py-2" for="accordion-2">
<i class="icon icon-arrow-right mr-1"></i>
<b>Technologies</b>
</label>

<div class="accordion-body">

<table class="table">
<tbody>

<tr>
<td>Troop Attack Value +1</td>
<td>
<select class="form-select" id="attack_team_troop">
<option value="1">0</option>
<option value="2">1</option>
<option value="3">2</option>
<option value="4">3</option>
</select>
</td>
<td>
<select class="form-select" id="attack_opponent_troop">
<option value="1">0</option>
<option value="2">1</option>
<option value="3">2</option>
<option value="4">3</option>
</select>
</td>
</tr>

<tr>
<td>Troop Defense Value +1</td>
<td>
<select class="form-select" id="def_team_troop">
<option value="1">0</option>
<option value="2">1</option>
<option value="3">2</option>
<option value="4">3</option>
</select>
</td>
<td>
<select class="form-select" id="def_opponent_troop">
<option value="1">0</option>
<option value="2">1</option>
<option value="3">2</option>
<option value="4">3</option>
</select>
</td>
</tr>

<tr>
<td>Hero Attack Value +5</td>
<td>
<select class="form-select" id="attack_team_hero">
<option value="0">0</option>
<option value="5">1</option>
<option value="10">2</option>
<option value="15">3</option>
</select>
</td>
<td>
<select class="form-select" id="attack_opponent_hero">
<option value="0">0</option>
<option value="5">1</option>
<option value="10">2</option>
<option value="15">3</option>
</select>
</td>
</tr>

<tr>
<td>Hero Defense Value +5</td>
<td>
<select class="form-select" id="def_team_hero">
<option value="0">0</option>
<option value="5">1</option>
<option value="10">2</option>
<option value="15">3</option>
</select>
</td>
<td>
<select class="form-select" id="def_opponent_hero">
<option value="0">0</option>
<option value="5">1</option>
<option value="10">2</option>
<option value="15">3</option>
</select>
</td>
</tr>

<tr>
<td>Watchtower Defense Modifier +%</td>
<td>
<select class="form-select" id="team_tower">
<option value="0">0</option>
<option value="0.1">10</option>
<option value="0.2">20</option>
<option value="0.3">30</option>
<option value="0.4">40</option>
<option value="0.5">50</option>
<option value="0.6">60</option>
</select>
</td>
<td>
<select class="form-select" id="opponent_tower">
<option value="0">0</option>
<option value="0.1">10</option>
<option value="0.2">20</option>
<option value="0.3">30</option>
<option value="0.4">40</option>
<option value="0.5">50</option>
<option value="0.6">60</option>
</select>
</td>
</tr>

<tr>
<td>War Energy Cost -%</td>
<td>
<select class="form-select" id="team_power">
<option value="1">0</option>
<option value="0.9">10</option>
<option value="0.8">20</option>
<option value="0.7">30</option>
<option value="0.6">40</option>
<option value="0.5">50</option>
<option value="0.4">60</option>
</select>
</td>
<td>
<select class="form-select" id="opponent_power">
<option value="1">0</option>
<option value="0.9">10</option>
<option value="0.8">20</option>
<option value="0.7">30</option>
<option value="0.6">40</option>
<option value="0.5">50</option>
<option value="0.4">60</option>
</select>
</td>
</tr>

</tbody>
</table>

</div>
</div>

<footer class="text-center mt-2 py-2">
Conquest Calculator
</footer>

</div>
</body>
</html>
