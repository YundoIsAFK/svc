<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supreme Victory Calculator</title>

<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">

<style>
html {
    background: #090a0b;
}

body {
    background:
        radial-gradient(circle at top, #1c1f24 0%, #111315 38%, #090a0b 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #d8dde5;
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0;
}

.container {
    max-width: 980px;
    margin: 0 auto;
    padding-top: 24px;
    padding-bottom: 32px;
}

.table {
    width: 100%;
    background: #16181b;
    border: 1px solid #2f343b;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.32);
}

.table td,
.table th {
    color: #d8dde5;
    border-bottom: 1px solid #252a31;
    vertical-align: middle;
    background: transparent;
}

.table tr:last-child td {
    border-bottom: none;
}

.table img {
    height: 22px;
    display: block;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35));
}

.results-table {
    margin-bottom: 16px;
    background: linear-gradient(180deg, #1b1e23 0%, #131519 100%);
    border: 1px solid #3a4048;
}

.results-table tr:first-child td {
    background: rgba(255,255,255,0.03);
    font-weight: 700;
}

.results-table td {
    font-size: 1.02rem;
}

.text-center b {
    font-size: 1.08rem;
    font-weight: 700;
}

#skull_team,
#power_team,
#attackdef_team {
    color: #cfd6df;
}

#skull_opponent,
#power_opponent,
#attackdef_opponent {
    color: #aeb7c2;
}

.accordion {
    margin-top: 14px;
}

.accordion-toggle {
    display: none;
}

.accordion-header {
    display: block;
    width: 100%;
    background: linear-gradient(180deg, #2a2e35 0%, #1f2329 100%);
    color: #e7ebf0;
    border: 1px solid #3d444d;
    border-radius: 12px;
    padding: 0.8rem 1rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    transition: background 0.2s ease, border-color 0.2s ease, border-radius 0.2s ease;
    margin: 0;
    user-select: none;
}

.accordion-header:hover {
    background: linear-gradient(180deg, #343941 0%, #262b31 100%);
    border-color: #515963;
}

.accordion-header .icon {
    transition: transform 0.2s ease;
}

.accordion-body {
    display: none;
    margin-top: -2px;
    background: linear-gradient(180deg, #181b20 0%, #14171b 100%);
    border: 1px solid #3d444d;
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 14px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
}

.accordion-toggle:checked + .accordion-header {
    border-radius: 12px 12px 0 0;
}

.accordion-toggle:checked + .accordion-header .icon {
    transform: rotate(90deg);
}

.accordion-toggle:checked + .accordion-header + .accordion-body {
    display: block;
}

.range-container {
    display: flex;
    align-items: center;
    gap: 12px;
}

.range-value {
    min-width: 72px;
    text-align: center;
    font-weight: 700;
    background: #0f1114;
    color: #e7ebf0;
    padding: 6px 10px;
    border: 1px solid #3d444d;
    border-radius: 10px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
}

input[type="range"] {
    flex: 1;
    accent-color: #7f8ea3;
}

.form-input,
.form-select {
    width: 100%;
    background: #0f1114 !important;
    color: #e7ebf0 !important;
    border: 1px solid #3d444d !important;
    border-radius: 10px !important;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
}

.form-input:focus,
.form-select:focus {
    background: #15181d !important;
    color: #f3f6fa !important;
    border-color: #7f8ea3 !important;
    box-shadow: 0 0 0 2px rgba(127,142,163,0.2), inset 0 1px 2px rgba(0,0,0,0.3) !important;
    outline: none;
}

.form-input::placeholder {
    color: #8d97a4;
}

.form-select {
    padding-right: 34px;
    background-image:
        linear-gradient(45deg, transparent 50%, #7f8ea3 50%),
        linear-gradient(135deg, #7f8ea3 50%, transparent 50%);
    background-position:
        calc(100% - 16px) calc(50% - 3px),
        calc(100% - 10px) calc(50% - 3px);
    background-size: 6px 6px;
    background-repeat: no-repeat;
}

.form-select option {
    background: #0f1114;
    color: #e7ebf0;
}

.tech-check-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
}

.tech-check {
    width: 18px;
    height: 18px;
    accent-color: #7f8ea3;
    cursor: pointer;
    transform: scale(1.15);
}

.icon {
    vertical-align: middle;
    opacity: 0.9;
}

b {
    font-weight: 600;
}

@media (max-width: 768px) {
    .container {
        margin: 0 auto;
        padding-top: 14px;
        padding-bottom: 20px;
        padding-left: 8px;
        padding-right: 8px;
    }

    .table td,
    .table th {
        padding: 0.45rem 0.35rem;
        font-size: 0.92rem;
    }

    .table img {
        height: 18px;
    }

    .text-center b {
        font-size: 0.98rem;
    }

    .range-container {
        gap: 8px;
    }

    .range-value {
        min-width: 64px;
        font-size: 0.9rem;
    }

    .form-input,
    .form-select {
        font-size: 0.92rem;
    }

    .tech-check {
        transform: scale(1.05);
    }

    .form-select {
        min-width: 90px;
    }
}
</style>
</head>

<body>
<div class="container grid-xs">

<table class="table results-table">
<tbody>
<tr>
<td></td>
<td class="text-center"><b>You</b></td>
<td class="text-center"><b>Opponent</b></td>
</tr>

<tr>
<td><img src="img/skull.png" alt="Skulls"></td>
<td class="text-center"><b id="skull_team">0</b></td>
<td class="text-center"><b id="skull_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/energy.png" alt="Energy"></td>
<td class="text-center"><b id="power_team">0</b></td>
<td class="text-center"><b id="power_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/calculator.png" alt="Combat Rating"></td>
<td class="text-center"><b id="attackdef_team">0</b></td>
<td class="text-center"><b id="attackdef_opponent">0</b></td>
</tr>
</tbody>
</table>

<div class="accordion">
<input type="checkbox" id="accordion-1" class="accordion-toggle" checked>
<label class="accordion-header py-2" for="accordion-1">
<i class="icon icon-arrow-right mr-1"></i>
<b>Settings</b>
</label>
<div class="accordion-body">
<table class="table">
<tbody>

<tr>
<td>Time Remaining</td>
<td colspan="2">
<div class="range-container">
    <input type="range" min="1" max="960" value="960" step="1" id="time_slider">
    <input
        type="text"
        class="range-value"
        id="time_display"
        value="16:00"
        style="outline:none; width:72px; text-align:center;"
    >
</div>
</td>
</tr>

<tr>
<td>Attacker</td>
<td colspan="2">
<select class="form-select" id="attacker">
<option value="team">You</option>
<option value="opponent">Opponent</option>
</select>
</td>
</tr>

<tr>
<td>Skulls Won</td>
<td><input class="form-input" type="number" min="0" id="skull_win_team" value="0"></td>
<td><input class="form-input" type="number" min="0" id="skull_win_opponent" value="0"></td>
</tr>

<tr>
<td>Number of Heroes</td>
<td><input class="form-input" type="number" min="0" max="65" id="nb_player_team" value="0"></td>
<td><input class="form-input" type="number" min="0" max="65" id="nb_player_opponent" value="0"></td>
</tr>

<tr>
<td>Number of Troops</td>
<td><input class="form-input" type="number" min="0" id="nb_troop_team" value="0"></td>
<td><input class="form-input" type="number" min="0" id="nb_troop_opponent" value="0"></td>
</tr>

<tr>
<td>Terrain</td>
<td colspan="2">
<select class="form-select" id="ground">
<option value="0.8;1.2">Forest (0.8 / 1.2)</option>
<option value="1;0.8">Grassland (1 / 0.8)</option>
<option value="1;1">Swamp (1 / 1)</option>
<option value="0.8;0.5">Desert (0.8 / 0.5)</option>
<option value="0.9;1.1">Hills (0.9 / 1.1)</option>
<option value="0.7;1.5">Rocky Hills (0.7 / 1.5)</option>
<option value="0.9;0.7">Sandy Hills (0.9 / 0.7)</option>
</select>
</td>
</tr>

<tr>
<td>Tower Level</td>
<td colspan="2">
<select class="form-select" id="tower_level">
<option value="1">0</option>
<option value="1.2">1</option>
<option value="1.5">2</option>
<option value="2">3</option>
<option value="2.5">4</option>
</select>
</td>
</tr>

</tbody>
</table>
</div>
</div>

<div class="accordion">
<input type="checkbox" id="accordion-2" class="accordion-toggle">
<label class="accordion-header py-2" for="accordion-2">
<i class="icon icon-arrow-right mr-1"></i>
<b>Technologies</b>
</label>
<div class="accordion-body">
<table class="table">
<tbody>

<tr>
<td>Troop Attack Value +1</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="attack_team_troop_plus1">
</div>
</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="attack_opponent_troop_plus1">
</div>
</td>
</tr>

<tr>
<td>Troop Defense Value +1</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="def_team_troop_plus1">
</div>
</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="def_opponent_troop_plus1">
</div>
</td>
</tr>

<tr>
<td>Hero Attack Value +5</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="attack_team_hero_plus5">
</div>
</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="attack_opponent_hero_plus5">
</div>
</td>
</tr>

<tr>
<td>Hero Defense Value +5</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="def_team_hero_plus5">
</div>
</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="def_opponent_hero_plus5">
</div>
</td>
</tr>

<tr>
<td>Hero Attack Value +7</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="attack_team_hero_plus7">
</div>
</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="attack_opponent_hero_plus7">
</div>
</td>
</tr>

<tr>
<td>Hero Defense Value +7</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="def_team_hero_plus7">
</div>
</td>
<td class="text-center">
<div class="tech-check-wrap">
    <input class="tech-check" type="checkbox" id="def_opponent_hero_plus7">
</div>
</td>
</tr>

<tr>
<td>Watchtower Defense Modifier +%</td>
<td>
<select class="form-select" id="team_tower">
<option value="0">0</option>
<option value="0.1">10</option>
<option value="0.2">20</option>
<option value="0.3">30</option>
<option value="0.4">40</option>
<option value="0.5">50</option>
<option value="0.6">60</option>
</select>
</td>
<td>
<select class="form-select" id="opponent_tower">
<option value="0">0</option>
<option value="0.1">10</option>
<option value="0.2">20</option>
<option value="0.3">30</option>
<option value="0.4">40</option>
<option value="0.5">50</option>
<option value="0.6">60</option>
</select>
</td>
</tr>

<tr>
<td>War Energy Cost -%</td>
<td>
<select class="form-select" id="team_power">
<option value="1">0</option>
<option value="0.9">10</option>
<option value="0.8">20</option>
<option value="0.7">30</option>
<option value="0.6">40</option>
<option value="0.5">50</option>
<option value="0.4">60</option>
</select>
</td>
<td>
<select class="form-select" id="opponent_power">
<option value="1">0</option>
<option value="0.9">10</option>
<option value="0.8">20</option>
<option value="0.7">30</option>
<option value="0.6">40</option>
<option value="0.5">50</option>
<option value="0.4">60</option>
</select>
</td>
</tr>

</tbody>
</table>
</div>
</div>

</div>

<script src="js/regression.js"></script>
<script src="js/conquestCalculator.js"></script>


</body>
</html>
