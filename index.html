<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RR2 – Conquest Calculator</title>

<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
<link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">

<style>
body {
    background-color: #1e1e1e;
    color: #e0e0e0;
    transition: background 0.3s, color 0.3s;
}
.container {
    max-width: 900px;
    margin-top: 20px;
}
.table {
    background-color: #2c2c2c;
    border-radius: 10px;
}
.table td {
    color: #e0e0e0;
    vertical-align: middle;
}
.accordion-header {
    cursor: pointer;
    transition: background 0.3s;
}
.accordion-header:hover {
    background-color: #444;
}
.accordion-body {
    background-color: #2c2c2c;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease;
}
.accordion-body.show {
    max-height: 1000px;
}
input[type=range] {
    width: 100%;
}
.range-value {
    text-align: right;
    margin-top: 5px;
    font-weight: bold;
    color: #ffd700;
}
footer {
    color: #999;
}
</style>
</head>

<body>
<div class="container grid-xs">

<h1 class="text-center mb-0">Conquest Calculator</h1>

<table class="table">
<tbody>
<tr>
<td></td>
<td class="text-center"><b>You</b></td>
<td class="text-center"><b>Opponent</b></td>
</tr>

<tr>
<td><img src="img/skull.png" alt="Skulls"></td>
<td class="text-center"><b id="skull_team">0</b></td>
<td class="text-center"><b id="skull_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/energy.png" alt="Energy"></td>
<td class="text-center"><b id="power_team">0</b></td>
<td class="text-center"><b id="power_opponent">0</b></td>
</tr>

<tr>
<td><img src="img/calculator.png" alt="Attack/Defense"></td>
<td class="text-center"><b id="attackdef_team">0</b></td>
<td class="text-center"><b id="attackdef_opponent">0</b></td>
</tr>
</tbody>
</table>

<div class="accordion">
<input type="radio" id="accordion-1" name="accordion-checkbox" hidden checked>
<label class="accordion-header bg-primary py-2" for="accordion-1">
<i class="icon icon-arrow-right mr-1"></i>
<b>Settings</b>
</label>
<div class="accordion-body show">

<table class="table">
<tbody>

<tr>
<td>Time Remaining (Hours)</td>
<td colspan="2">
<input type="range" min="0" max="23.99" step="0.01" id="time_hour_slider">
<div class="range-value" id="time_hour_display">0h</div>
</td>
</tr>

<tr>
<td>Attacker</td>
<td colspan="2">
<select class="form-select" id="attacker">
<option value="team">You</option>
<option value="opponent">Opponent</option>
</select>
</td>
</tr>

<tr>
<td>Skulls Won</td>
<td><input class="form-input" type="number" min="0" id="skull_win_team"></td>
<td><input class="form-input" type="number" min="0" id="skull_win_opponent"></td>
</tr>

<tr>
<td>Number of Heroes</td>
<td><input class="form-input" type="number" min="0" max="65" id="nb_player_team"></td>
<td><input class="form-input" type="number" min="0" max="65" id="nb_player_opponent"></td>
</tr>

<tr>
<td>Number of Troops</td>
<td><input class="form-input" type="number" min="0" id="nb_troop_team"></td>
<td><input class="form-input" type="number" min="0" id="nb_troop_opponent"></td>
</tr>

<tr>
<td>Terrain</td>
<td colspan="2">
<select class="form-select" id="ground">
<option value="0.7;1.3">Forest (0.7 / 1.3)</option>
<option value="1;0.8">Meadow (1 / 0.8)</option>
<option value="1;1">Swamp (1 / 1)</option>
<option value="0.8;0.5">Desert (0.8 / 0.5)</option>
<option value="0.9;1.1">Hills (0.9 / 1.1)</option>
<option value="0.7;1.5">Rocky Hills (0.7 / 1.5)</option>
<option value="0.9;0.7">Sandy Hills (0.9 / 0.7)</option>
</select>
</td>
</tr>

<tr>
<td>Tower Level</td>
<td colspan="2">
<select class="form-select" id="tower_level">
<option value="1">0</option>
<option value="1.2">1</option>
<option value="1.5">2</option>
<option value="2">3</option>
<option value="2.5">4</option>
</select>
</td>
</tr>

</tbody>
</table>

</div>
</div>

<!-- TECHNOLOGIES ACCORDION (unchanged) -->
<div class="accordion">
<input type="radio" id="accordion-2" name="accordion-checkbox" hidden>
<label class="accordion-header bg-primary py-2" for="accordion-2">
<i class="icon icon-arrow-right mr-1"></i>
<b>Technologies</b>
</label>
<div class="accordion-body">

<table class="table">
<tbody>

<!-- Same technology rows as before -->

</tbody>
</table>

</div>
</div>

<footer class="text-center mt-2 py-2">
Conquest Calculator
</footer>

</div>

<script src="js/regression.js"></script>
<script src="js/conquestCalculator.js"></script>

<script>
const slider = document.getElementById('time_hour_slider');
const display = document.getElementById('time_hour_display');
slider.addEventListener('input', () => {
    const val = parseFloat(slider.value);
    display.innerText = val.toFixed(2) + "h";
    calc.time_hour = Math.floor(val);
    calc.time_minute = Math.round((val - Math.floor(val)) * 60);
    calc.render();
});
</script>

<script>
/* Smooth accordion toggle */
const accordions = document.querySelectorAll('.accordion');
accordions.forEach(acc => {
    const header = acc.querySelector('.accordion-header');
    const body = acc.querySelector('.accordion-body');
    header.addEventListener('click', () => {
        body.classList.toggle('show');
    });
});
</script>
</body>
</html>
